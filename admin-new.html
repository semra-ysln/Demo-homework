<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookstore Admin Panel - Yönetim Paneli</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-header">
          <h3><i class="fas fa-book"></i> Bookstore</h3>
        </div>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="fas fa-home"></i> Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="admin.html">
              <i class="fas fa-lock"></i> Admin
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <div class="content">
        <!-- Header -->
        <header class="header">
          <div class="container-fluid">
            <div class="row align-items-center">
              <div class="col-md-6">
                <h1 class="page-title">
                  <i class="fas fa-cog"></i> Admin Panel
                </h1>
              </div>
              <div class="col-md-6 text-end">
                <button
                  class="btn btn-primary btn-sm me-2"
                  onclick="openAddModal()"
                  data-bs-toggle="modal"
                  data-bs-target="#bookModal"
                >
                  <i class="fas fa-plus"></i> Add New Book
                </button>
                <button class="btn btn-warning btn-sm me-2" onclick="addTestData()">
                  <i class="fas fa-flask"></i> Add Test Data
                </button>
                <button class="btn btn-danger btn-sm" onclick="confirmReset()">
                  <i class="fas fa-undo"></i> Reset System
                </button>
              </div>
            </div>
          </div>
        </header>

        <!-- Main Content Area -->
        <main>
          <!-- Admin Table Section -->
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0"><i class="fas fa-list"></i> Books Management</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover table-striped" id="adminTable">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Title</th>
                      <th>Author</th>
                      <th>Price</th>
                      <th>Category</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <!-- Dinamik olarak doldurulacak -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
          <div class="container-fluid">
            <p class="mb-0">© 2026 Bookstore Admin - All Rights Reserved</p>
          </div>
        </footer>
      </div>
    </div>

    <!-- Add/Edit Book Modal -->
    <div
      class="modal fade"
      id="bookModal"
      tabindex="-1"
      aria-labelledby="bookModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="bookModalLabel">Add New Book</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="bookForm">
              <div class="mb-3">
                <label for="bookTitle" class="form-label">Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="bookTitle"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="bookAuthor" class="form-label">Author</label>
                <input
                  type="text"
                  class="form-control"
                  id="bookAuthor"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="bookPrice" class="form-label">Price</label>
                <input
                  type="number"
                  class="form-control"
                  id="bookPrice"
                  step="0.01"
                  min="0"
                  max="999.99"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="bookCategory" class="form-label">Category</label>
                <select class="form-select" id="bookCategory" required>
                  <option value="">Select Category</option>
                  <option value="Roman">Roman</option>
                  <option value="Bilim Kurgu">Bilim Kurgu</option>
                  <option value="Tarih">Tarih</option>
                  <option value="Biyografi">Biyografi</option>
                  <option value="Aşçılık">Aşçılık</option>
                  <option value="Bilim">Bilim</option>
                  <option value="Çocuk">Çocuk</option>
                  <option value="Şiir">Şiir</option>
                  <option value="Öykü">Öykü</option>
                  <option value="İş/Ekonomi">İş/Ekonomi</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="bookCover" class="form-label">Cover URL</label>
                <input
                  type="url"
                  class="form-control"
                  id="bookCover"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="bookISBN" class="form-label">ISBN (Optional)</label>
                <input type="text" class="form-control" id="bookISBN" />
              </div>
              <div class="mb-3">
                <label for="bookDescription" class="form-label"
                  >Description (Optional)</label
                >
                <textarea
                  class="form-control"
                  id="bookDescription"
                  rows="3"
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveBook()"
            >
              Save Book
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- sql.js (SQLite for JavaScript) - FIXED CDN -->
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

    <!-- Inline JS -->
    <script>
      let SQL;
      let bookStore;
      let editingBookId = null;

      // SQL.js initialization
      async function initSqlJs() {
        return new Promise((resolve) => {
          window.initSqlJs().then((sql) => {
            SQL = sql;
            resolve();
          });
        });
      }

      // SQLiteStore class (sama dengan index.html)
      class SQLiteStore {
        constructor() {
          this.db = null;
          this.dbKey = "bookstore_db";
          this.goldenDataUrl = "./golden-data.json";
        }

        async init() {
          try {
            this.db = new SQL.Database();
            this.createSchema();
            const storedDb = localStorage.getItem(this.dbKey);
            if (storedDb) {
              try {
                const data = JSON.parse(storedDb);
                this.db = new SQL.Database(new Uint8Array(data));
                console.log("✅ Database restored");
              } catch (e) {
                await this.loadGoldenData();
              }
            } else {
              await this.loadGoldenData();
            }
          } catch (error) {
            console.error("❌ Init error:", error);
            throw error;
          }
        }

        createSchema() {
          if (!this.db) return;
          this.db.run(`
            CREATE TABLE IF NOT EXISTS books (
              id INTEGER PRIMARY KEY,
              title TEXT NOT NULL,
              author TEXT NOT NULL,
              price REAL NOT NULL,
              category TEXT NOT NULL,
              cover TEXT,
              isbn TEXT,
              description TEXT,
              publication_date TEXT,
              status TEXT DEFAULT 'active',
              created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
            )
          `);
          this.db.run(`
            CREATE TABLE IF NOT EXISTS sales (
              id INTEGER PRIMARY KEY,
              book_id INTEGER NOT NULL,
              month INTEGER,
              quantity INTEGER,
              FOREIGN KEY(book_id) REFERENCES books(id)
            )
          `);
        }

        async loadGoldenData() {
          try {
            const response = await fetch(this.goldenDataUrl);
            const goldenBooks = await response.json();
            this.db.run("DELETE FROM sales");
            this.db.run("DELETE FROM books");
            goldenBooks.forEach((book) => {
              this.db.run(
                `INSERT INTO books (id, title, author, price, category, cover, isbn, description, publication_date, status)
                 VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
                [
                  book.id, book.title, book.author, book.price, book.category,
                  book.cover, book.isbn || null, book.description || null,
                  book.publication_date || null, book.status || "active",
                ]
              );
              Object.entries(book.sales || {}).forEach(([month, quantity]) => {
                this.db.run(
                  "INSERT INTO sales (book_id, month, quantity) VALUES (?, ?, ?)",
                  [book.id, parseInt(month), quantity]
                );
              });
            });
            this.saveDb();
            console.log(`✅ Loaded ${goldenBooks.length} books`);
          } catch (error) {
            console.error("❌ Error loading golden data:", error);
            throw error;
          }
        }

        getBooks() {
          try {
            const stmt = this.db.prepare("SELECT * FROM books ORDER BY id DESC");
            const books = [];
            while (stmt.step()) {
              books.push(stmt.getAsObject());
            }
            stmt.free();
            return books;
          } catch (error) {
            console.error("❌ Error:", error);
            return [];
          }
        }

        getBook(id) {
          try {
            const stmt = this.db.prepare("SELECT * FROM books WHERE id = ?");
            stmt.bind([id]);
            const book = stmt.step() ? stmt.getAsObject() : null;
            stmt.free();
            return book;
          } catch (error) {
            return null;
          }
        }

        addBook(bookData) {
          const errors = this.validateBook(bookData);
          if (errors.length > 0) throw new Error(errors.join(", "));
          try {
            const stmt = this.db.prepare("SELECT MAX(id) as maxId FROM books");
            stmt.step();
            const { maxId } = stmt.getAsObject();
            stmt.free();
            const newId = (maxId || 0) + 1;
            this.db.run(
              `INSERT INTO books (id, title, author, price, category, cover, isbn, description, publication_date, status)
               VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
              [newId, bookData.title.trim(), bookData.author.trim(),
                parseFloat(bookData.price), bookData.category, bookData.cover.trim(),
                bookData.isbn || null, bookData.description || null,
                bookData.publication_date || null, "active"]
            );
            this.saveDb();
            console.log(`✅ Book added`);
            return newId;
          } catch (error) {
            console.error("❌ Error:", error);
            throw error;
          }
        }

        updateBook(id, updateData) {
          try {
            const errors = this.validateBook(updateData);
            if (errors.length > 0) throw new Error(errors.join(", "));
            this.db.run(
              `UPDATE books SET title = ?, author = ?, price = ?, category = ?, 
               cover = ?, isbn = ?, description = ?, publication_date = ?, 
               updated_at = CURRENT_TIMESTAMP WHERE id = ?`,
              [updateData.title.trim(), updateData.author.trim(),
                parseFloat(updateData.price), updateData.category,
                updateData.cover.trim(), updateData.isbn || null,
                updateData.description || null,
                updateData.publication_date || null, id]
            );
            this.saveDb();
            console.log(`✅ Book updated`);
          } catch (error) {
            console.error("❌ Error:", error);
            throw error;
          }
        }

        deleteBook(id) {
          try {
            this.db.run("DELETE FROM sales WHERE book_id = ?", [id]);
            this.db.run("DELETE FROM books WHERE id = ?", [id]);
            this.saveDb();
            console.log(`✅ Book deleted`);
          } catch (error) {
            console.error("❌ Error:", error);
            throw error;
          }
        }

        async resetData() {
          try {
            this.db.run("DELETE FROM sales");
            this.db.run("DELETE FROM books");
            await this.loadGoldenData();
            console.log("✅ Reset to golden state");
          } catch (error) {
            console.error("❌ Error:", error);
            throw error;
          }
        }

        validateBook(book) {
          const errors = [];
          if (!book.title || book.title.trim().length < 3)
            errors.push("Title 3+ chars");
          if (!book.author || book.author.trim().length < 2)
            errors.push("Author required");
          if (!book.price || parseFloat(book.price) <= 0 || parseFloat(book.price) > 999.99)
            errors.push("Price 0-999.99");
          const validCats = ["Roman", "Bilim Kurgu", "Tarih", "Biyografi", "Aşçılık", "Bilim", "Çocuk", "Şiir", "Öykü", "İş/Ekonomi"];
          if (!book.category || !validCats.includes(book.category))
            errors.push("Invalid category");
          if (!book.cover || !this.isValidUrl(book.cover))
            errors.push("Invalid cover URL");
          return errors;
        }

        isValidUrl(string) {
          try {
            new URL(string);
            return true;
          } catch (_) {
            return false;
          }
        }

        saveDb() {
          try {
            const data = this.db.export();
            localStorage.setItem(this.dbKey, JSON.stringify(Array.from(data)));
          } catch (error) {
            console.error("❌ Error saving DB:", error);
          }
        }
      }

      // Toast
      class Toast {
        static show(message, type = "info", duration = 4000) {
          const container = document.getElementById("toastContainer");
          const toastEl = document.createElement("div");
          toastEl.className = `toast-notification toast-${type}`;
          toastEl.innerHTML = `
            <i class="fas fa-${type === "success" ? "check-circle" : type === "error" ? "times-circle" : type === "warning" ? "exclamation-circle" : "info-circle"}"></i>
            <span>${message}</span>
          `;
          container.appendChild(toastEl);
          setTimeout(() => {
            toastEl.classList.add("hide");
            setTimeout(() => toastEl.remove(), 300);
          }, duration);
        }
      }

      // App Functions
      async function initApp() {
        try {
          await initSqlJs();
          bookStore = new SQLiteStore();
          await bookStore.init();
          renderTable();
          Toast.show("Admin Panel loaded ✨", "success");
        } catch (error) {
          Toast.show("Error: " + error.message, "error");
        }
      }

      function renderTable() {
        const tbody = document.querySelector("#adminTable tbody");
        tbody.innerHTML = "";
        bookStore.getBooks().forEach((book) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${book.id}</td>
            <td><strong>${book.title}</strong></td>
            <td>${book.author}</td>
            <td>$${parseFloat(book.price).toFixed(2)}</td>
            <td>${book.category}</td>
            <td><span class="badge bg-success">${book.status}</span></td>
            <td>
              <button class="btn btn-sm btn-primary me-1" onclick="editBook(${book.id})">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteBook(${book.id})">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function openAddModal() {
        editingBookId = null;
        document.getElementById("bookModalLabel").textContent = "Add New Book";
        document.getElementById("bookForm").reset();
      }

      function editBook(id) {
        const book = bookStore.getBook(id);
        if (!book) {
          Toast.show("Book not found", "error");
          return;
        }
        editingBookId = id;
        document.getElementById("bookModalLabel").textContent = "Edit Book";
        document.getElementById("bookTitle").value = book.title;
        document.getElementById("bookAuthor").value = book.author;
        document.getElementById("bookPrice").value = book.price;
        document.getElementById("bookCategory").value = book.category;
        document.getElementById("bookCover").value = book.cover;
        document.getElementById("bookISBN").value = book.isbn || "";
        document.getElementById("bookDescription").value = book.description || "";
        const modal = new bootstrap.Modal(document.getElementById("bookModal"));
        modal.show();
      }

      function saveBook() {
        try {
          const bookData = {
            title: document.getElementById("bookTitle").value,
            author: document.getElementById("bookAuthor").value,
            price: document.getElementById("bookPrice").value,
            category: document.getElementById("bookCategory").value,
            cover: document.getElementById("bookCover").value,
            isbn: document.getElementById("bookISBN").value,
            description: document.getElementById("bookDescription").value,
            publication_date: new Date().toISOString().split("T")[0],
          };

          if (editingBookId) {
            bookStore.updateBook(editingBookId, bookData);
            Toast.show("✅ Book updated", "success");
          } else {
            bookStore.addBook(bookData);
            Toast.show("✅ Book added", "success");
          }

          renderTable();
          bootstrap.Modal.getInstance(document.getElementById("bookModal")).hide();
        } catch (error) {
          Toast.show("Error: " + error.message, "error");
        }
      }

      function deleteBook(id) {
        if (confirm("Are you sure?")) {
          bookStore.deleteBook(id);
          renderTable();
          Toast.show("✅ Book deleted", "success");
        }
      }

      function addTestData() {
        const testBooks = [
          {title: "Test Kitap 1 🧪", author: "Test Author", price: 99999, category: "Roman", cover: "https://via.placeholder.com/80x120?text=Test1", description: "Test data", publication_date: "2024-01-01"},
          {title: "Saçma Kitap 2 😂", author: "Random", price: 0.01, category: "Bilim Kurgu", cover: "https://via.placeholder.com/80x120?text=Test2", description: "Bad data", publication_date: "2024-01-01"},
        ];

        testBooks.forEach((book) => {
          try {
            bookStore.addBook(book);
          } catch (e) {
            console.error(e);
          }
        });

        renderTable();
        Toast.show(`✅ Added ${testBooks.length} test books`, "warning");
      }

      async function confirmReset() {
        if (confirm("Reset to golden state? All custom data will be lost!")) {
          try {
            await bookStore.resetData();
            renderTable();
            Toast.show("✅ Reset to golden state", "success");
          } catch (error) {
            Toast.show("Error: " + error.message, "error");
          }
        }
      }

      // Keyboard shortcut
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === "R") {
          e.preventDefault();
          confirmReset();
        }
      });

      // Init
      document.addEventListener("DOMContentLoaded", initApp);
    </script>
  </body>
</html>
